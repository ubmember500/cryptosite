<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Схема перекладена</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #dcdcdc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: auto;
        }

        .flow-container {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 50px;
        }

        .node {
            background-color: #242424;
            border: 1px solid #4d4d4d;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            min-width: 80px;
            justify-content: center;
            white-space: nowrap;
        }

        .diamond {
            width: 50px;
            height: 50px;
            background-color: #242424;
            border: 1px solid #4d4d4d;
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 40px;
            position: relative;
        }

        .diamond span {
            transform: rotate(-45deg);
            font-weight: 500;
        }

        .arrow {
            width: 40px;
            height: 1px;
            background-color: #666;
            position: relative;
        }

        .arrow::after {
            content: '';
            position: absolute;
            right: 0;
            top: -3px;
            border-left: 6px solid #666;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
        }

        .branch-label {
            position: absolute;
            background: #444;
            color: #fff;
            font-size: 11px;
            padding: 2px 4px;
            z-index: 10;
        }

        .label-no {
            top: -15px;
            right: -25px;
        }

        .label-yes {
            bottom: -15px;
            right: -25px;
        }

        .error-node {
            background-color: #ffe8e8;
            color: #d32f2f;
            border: 1px solid #ffcfcf;
            padding: 15px 25px;
            font-size: 20px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-node {
            background-color: #e6f7ed;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
            padding: 12px 20px;
            font-weight: bold;
        }

        /* Line for "No" branch */
        .no-path {
            position: absolute;
            top: -40px;
            left: 24px;
            width: 1px;
            height: 40px;
            background: #666;
        }

        .no-path-horizontal {
            position: absolute;
            top: -40px;
            left: 25px;
            width: 40px;
            height: 1px;
            background: #666;
        }

        .branch-label {
            position: absolute;
            background: #444;
            color: #fff;
            font-size: 11px;
            padding: 1px 4px;
            z-index: 10;
        }

        .label-no {
            top: -15px;
            left: 10px;
        }

        .label-yes {
            bottom: 5px;
            right: -35px;
        }

        .error-node {
            background-color: #ffe8e8;
            color: #d32f2f;
            border: 1px solid #ffcfcf;
            padding: 10px;
            font-size: 20px;
            width: 45px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -65px;
            left: 65px;
        }
    </style>
</head>
<body>
    <div class="flow-container">
        <!-- 1. Form -->
        <div class="node">📝 Форма</div>
        <div class="arrow"></div>

        <!-- 2. Browser checks -->
        <div class="node">✔️ Браузер перевіряє</div>
        <div class="arrow"></div>

        <!-- 3. OK Diamond -->
        <div class="diamond">
            <span>ОК?</span>
            <!-- No path -->
            <div class="no-path"></div>
            <div class="no-path-horizontal"></div>
            <div class="branch-label label-no">Ні</div>
            <div class="error-node">❌</div>
            
            <!-- Yes path -->
            <div class="branch-label label-yes">Так</div>
        </div>

        <div class="arrow"></div>

        <!-- 4. Server -->
        <div class="node">🗳️ Server</div>
        <div class="arrow"></div>

        <!-- 5. DB -->
        <div class="node">✔️ В БД</div>
        <div class="arrow"></div>

        <!-- 6. Tokens -->
        <div class="node">🔑 Токени</div>
        <div class="arrow"></div>

        <!-- 7. Save -->
        <div class="node">💾 Зберегти</div>
        <div class="arrow"></div>

        <!-- 8. Finish -->
        <div class="success-node">✅ Готово!</div>
    </div>
</body>
</html>
