<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схема Алертів - Українська</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 50px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 80px;
        }

        .alert-group {
            display: flex;
            align-items: flex-start;
            gap: 40px;
            position: relative;
        }

        .alert-box {
            padding: 15px 30px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 18px;
            width: 200px;
            text-align: center;
            color: white;
            flex-shrink: 0;
        }

        .alert-box.green {
            background-color: #00ff00;
            color: #000;
        }

        .alert-box.red {
            background-color: #ff0000;
            color: white;
        }

        .branches {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            margin-top: 10px;
        }

        .branch {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .branch-label {
            background-color: #555;
            color: #ccc;
            padding: 6px 12px;
            font-size: 13px;
            min-width: 80px;
            text-align: center;
            flex-shrink: 0;
        }

        .arrow-line {
            width: 40px;
            height: 2px;
            background-color: #888;
            position: relative;
        }

        .arrow-line::after {
            content: '';
            position: absolute;
            right: -8px;
            top: -4px;
            width: 0;
            height: 0;
            border-left: 10px solid #888;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }

        .result-box {
            padding: 15px 25px;
            border-radius: 4px;
            font-size: 15px;
            text-align: center;
            line-height: 1.4;
            color: white;
            min-width: 180px;
            flex-shrink: 0;
        }

        .result-box.green {
            background-color: #00ff00;
            color: #000;
        }

        .result-box.red {
            background-color: #ff0000;
        }

        .vertical-line {
            position: absolute;
            width: 2px;
            background-color: #888;
            left: 30%;
            height: 100%;
        }

        .flow-section {
            display: flex;
            gap: 60px;
            align-items: flex-start;
            margin-left: 30px;
        }

        .flow-column {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .flow-column.vertical {
            flex-direction: column;
            width: 100%;
        }

        @media (max-width: 768px) {
            .alert-group {
                flex-direction: column;
                gap: 30px;
            }

            .flow-section {
                flex-direction: column;
                margin-left: 0;
                gap: 30px;
            }

            .branches {
                gap: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- PRICE ALERT -->
        <div class="alert-group">
            <div class="alert-box green">🔔 PRICE ALERT</div>
            
            <div class="branches">
                <!-- Row 1: Параметри -->
                <div class="branch">
                    <div class="branch-label">Параметри</div>
                    <div class="arrow-line"></div>
                    <div class="result-box green">
                        1 монета<br>
                        1 цільова ціна
                    </div>
                </div>

                <!-- Row 2: Спрацьовує -->
                <div class="branch">
                    <div class="branch-label">Спрацьовує</div>
                    <div class="arrow-line"></div>
                    <div class="result-box green">
                        Ціна перетинає<br>
                        вашу ціль
                    </div>
                </div>

                <!-- Row 3: Приклад -->
                <div class="branch">
                    <div class="branch-label">Приклад</div>
                    <div class="arrow-line"></div>
                    <div class="result-box green">
                        BTC → $100,000
                    </div>
                </div>
            </div>
        </div>

        <!-- COMPLEX ALERT -->
        <div class="alert-group">
            <div class="alert-box red">⚠️ COMPLEX ALERT</div>
            
            <div class="branches">
                <!-- Row 1: Параметри -->
                <div class="branch">
                    <div class="branch-label">Параметри</div>
                    <div class="arrow-line"></div>
                    <div class="result-box red">
                        Багато монет<br>
                        X% руху
                    </div>
                </div>

                <!-- Row 2: Спрацьовує -->
                <div class="branch">
                    <div class="branch-label">Спрацьовує</div>
                    <div class="arrow-line"></div>
                    <div class="result-box red">
                        Будь-яка монета<br>
                        рухається X% в 1 хв
                    </div>
                </div>

                <!-- Row 3: Приклад -->
                <div class="branch">
                    <div class="branch-label">Приклад</div>
                    <div class="arrow-line"></div>
                    <div class="result-box red">
                        Будь-яка з топ-20<br>
                        +5% за хвилину
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
